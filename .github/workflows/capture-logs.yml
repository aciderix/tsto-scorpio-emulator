name: Capture TSTO Logs via BrowserBase

on:
  repository_dispatch:
    types: [netlify-deploy]
  workflow_dispatch:

jobs:
  capture-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/setup-tsto-emulator-BQgHo
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: pip install websocket-client
      
      - name: Wait for Netlify to finish deploying
        run: sleep 30
      
      - name: Run BrowserBase log capture
        env:
          BROWSERBASE_API_KEY: ${{ secrets.BROWSERBASE_API_KEY }}
          BROWSERBASE_PROJECT_ID: ${{ secrets.BROWSERBASE_PROJECT_ID }}
        run: python scripts/capture-logs.py
      
      - name: Commit and push logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/
          git diff --staged --quiet || git commit -m "🤖 Auto-captured logs $(date -u +%Y%m%d-%H%M%S)"
          git push
